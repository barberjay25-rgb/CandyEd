<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyEd - Aprendizaje Divertido</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FF8EBC; --blue: #7DD3FC; --green: #4ADE80; --orange: #FB923C; --text: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Fredoka', sans-serif; background: #FDF2F8; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 100%); }
        
        .app-container {
            width: 92vw; height: 90vh; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px);
            border: 6px solid white; border-radius: 50px; display: flex; flex-direction: column; align-items: center;
            padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); position: relative;
        }
        
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.4s ease-out; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .brand-name { font-size: 3.5rem; background: linear-gradient(45deg, #FF6FB5, #4FA8E8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0 0; }
        .slogan { font-size: 1.1rem; color: #64748b; font-weight: 700; margin-bottom: 20px; }

        .grid-layout { display: grid; gap: 15px; width: 100%; max-width: 450px; margin-top: 10px; }
        .btn-card {
            background: white; border-radius: 30px; border: 4px solid white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 700; box-shadow: 0 10px 0 #E2E8F0; cursor: pointer; transition: 0.1s;
        }
        .btn-card:active { transform: translateY(6px); box-shadow: 0 4px 0 #E2E8F0; }

        .btn-lang { padding: 20px; font-size: 1.5rem; color: var(--text); }
        .btn-game { height: 140px; font-size: 1.2rem; }
        
        /* Estilo para los botones de nivel con edades */
        .btn-level { padding: 15px; height: 90px; flex-direction: row; justify-content: flex-start; padding-left: 30px; gap: 20px; }
        .level-info { display: flex; flex-direction: column; align-items: flex-start; }
        .age-label { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
        
        .icon-lg { font-size: 3rem; }
        .icon-md { font-size: 2.2rem; }
        .back-btn { margin-top: 20px; color: var(--text); font-weight: 700; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        
        <div id="screen-lang" class="screen active">
            <h1 class="brand-name">CandyEd</h1>
            <p class="slogan">Elige tu idioma / Choose language</p>
            <div class="grid-layout">
                <div class="btn-card btn-lang" onclick="setLang('es')">Español 🇪🇸</div>
                <div class="btn-card btn-lang" onclick="setLang('en')">English 🇺🇸</div>
            </div>
        </div>

        <div id="screen-main" class="screen">
            <h1 class="brand-name">CandyEd</h1>
            <p id="main-slogan" class="slogan"></p>
            <div class="grid-layout" style="grid-template-columns: 1fr 1fr;">
                <div class="btn-card btn-game" onclick="goToLevels()" style="color: var(--pink); border-bottom: 6px solid var(--pink);">
                    <span class="icon-lg">🔢</span><span id="txt-num"></span>
                </div>
                <div class="btn-card btn-game" onclick="goToLevels()" style="color: var(--blue); border-bottom: 6px solid var(--blue);">
                    <span class="icon-lg">ABC</span><span id="txt-let"></span>
                </div>
            </div>
            <div class="back-btn" onclick="showScreen('screen-lang')">← Cambiar Idioma</div>
        </div>

        <div id="screen-levels" class="screen">
            <h1 class="brand-name">CandyEd</h1>
            <p id="level-title" class="slogan"></p>
            <div class="grid-layout">
                <div class="btn-card btn-level" onclick="alert('Start!')" style="color: var(--blue); border-bottom: 6px solid var(--blue);">
                    <span class="icon-md">🎯</span>
                    <div class="level-info">
                        <span id="label-n"></span>
                        <span class="age-label" id="age-n"></span>
                    </div>
                </div>
                <div class="btn-card btn-level" onclick="alert('Start!')" style="color: var(--green); border-bottom: 6px solid var(--green);">
                    <span class="icon-md">💎</span>
                    <div class="level-info">
                        <span id="label-a"></span>
                        <span class="age-label" id="age-a"></span>
                    </div>
                </div>
                <div class="btn-card btn-level" onclick="alert('Start!')" style="color: var(--orange); border-bottom: 6px solid var(--orange);">
                    <span class="icon-md">🔥</span>
                    <div class="level-info">
                        <span id="label-e"></span>
                        <span class="age-label" id="age-e"></span>
                    </div>
                </div>
            </div>
            <div class="back-btn" onclick="showScreen('screen-main')">← Volver / Back</div>
        </div>

    </div>

    <script>
        const translations = {
            es: { 
                slogan: "aprendizaje divertido", num: "NÚMEROS", let: "LETRAS", selLevel: "Elige tu nivel",
                n: "PRINCIPIANTE", a: "AVANZADO", e: "EXPERTO", age: "años"
            },
            en: { 
                slogan: "fun learning", num: "NUMBERS", let: "LETTERS", selLevel: "Choose your level",
                n: "NOOB", a: "ADVANCED", e: "EXPERT", age: "yrs"
            }
        };

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function setLang(lang) {
            const t = translations[lang];
            document.getElementById('main-slogan').innerText = t.slogan;
            document.getElementById('txt-num').innerText = t.num;
            document.getElementById('txt-let').innerText = t.let;
            document.getElementById('level-title').innerText = t.selLevel;
            
            // Set Levels and Ages
            document.getElementById('label-n').innerText = t.n;
            document.getElementById('age-n').innerText = `2-4 ${t.age}`;
            document.getElementById('label-a').innerText = t.a;
            document.getElementById('age-a').innerText = `5-7 ${t.age}`;
            document.getElementById('label-e').innerText = t.e;
            document.getElementById('age-e').innerText = `8-10 ${t.age}`;
            
            showScreen('screen-main');
        }

        function goToLevels() { showScreen('screen-levels'); }

        // --- Fondo Animado ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<15; i++) {
                particles.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
                    size: Math.random()*20+10, color: `hsla(${Math.random()*360}, 70%, 90%, 0.3)`
                });
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
