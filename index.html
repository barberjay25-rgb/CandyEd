<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyEd - Experiencia Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FF6FB5; --blue: #4FA8E8; --yellow: #FFE135; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #FFE135, #FDF2F8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* CAPAS DE MAGIA (Burbujas y Estrellas) */
        .magic-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        .star { position: absolute; background: white; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: starFly 3s linear infinite; }
        @keyframes starFly { 
            0% { transform: scale(0) rotate(0deg); opacity: 1; } 
            100% { transform: scale(1.5) rotate(180deg) translate(100px, 100px); opacity: 0; } 
        }

        /* EL TREN */
        .train { position: absolute; bottom: 10%; left: -500px; font-size: 4rem; animation: trainPass 10s linear infinite; z-index: 1; }
        @keyframes trainPass { 0% { left: -500px; } 100% { left: 110%; } }

        .app-container {
            width: 94vw; height: 92vh; background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px); border: 8px solid white; border-radius: 60px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); position: relative; z-index: 10;
        }

        /* BOTONES Y CARDS */
        .grid-layout { display: grid; gap: 15px; width: 100%; max-width: 500px; overflow-y: auto; padding: 10px; }
        .card {
            background: white; border-radius: 35px; border: 5px solid white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 0 #E2E8F0; transition: 0.1s; cursor: pointer;
        }
        .card:active { transform: scale(0.95) translateY(5px); }

        .screen { display: none; width: 100%; flex-direction: column; align-items: center; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .active { display: flex; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .brand-name { font-size: 4rem; background: linear-gradient(45deg, var(--pink), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(2px 2px white); }
    </style>
</head>
<body onclick="startMagic()">

    <div class="magic-layer" id="magic-layer"></div>
    <div class="train">🚂🚃🏠🚃🍭</div>

    <div class="app-container">
        
        <div id="scr-lang" class="screen active">
            <h1 class="brand-name">CandyEd</h1>
            <p style="font-weight: 700; color: #666; margin-bottom: 20px;">¡Toca para empezar! / Tap to start!</p>
            <div class="grid-layout" style="grid-template-columns: 1fr;">
                <div class="card" onclick="setLang('es')" style="height:100px; color: var(--pink); font-size: 1.5rem; font-weight:700;">ESPAÑOL 🇪🇸</div>
                <div class="card" onclick="setLang('en')" style="height:100px; color: var(--blue); font-size: 1.5rem; font-weight:700;">ENGLISH 🇺🇸</div>
            </div>
        </div>

        <div id="scr-main" class="screen">
            <h1 class="brand-name">CandyEd</h1>
            <div class="grid-layout" style="grid-template-columns: 1fr 1fr;">
                <div class="card" onclick="goToLevels('num')" style="height:160px; color: var(--pink); border-bottom: 8px solid var(--pink);">
                    <div style="text-align:center;"><span style="font-size:4rem;">🔢</span><br><b id="txt-num"></b></div>
                </div>
                <div class="card" onclick="goToLevels('let')" style="height:160px; color: var(--blue); border-bottom: 8px solid var(--blue);">
                    <div style="text-align:center;"><span style="font-size:4rem;">ABC</span><br><b id="txt-let"></b></div>
                </div>
            </div>
        </div>

        <div id="scr-levels" class="screen">
            <h2 id="lvl-title" style="color:var(--pink); margin-bottom:15px;"></h2>
            <div class="grid-layout" style="grid-template-columns: 1fr 1fr; height: 350px;">
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🎮 Juego 1</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🎨 Juego 2</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🚀 Juego 3</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🦁 Juego 4</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🧩 Juego 5</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🍭 Juego 6</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🎸 Juego 7</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🌈 Juego 8</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">🍎 Juego 9</div>
                <div class="card" style="height:80px; font-size:0.9rem;" onclick="playPop()">💎 Juego 10</div>
            </div>
            <div onclick="showScreen('scr-main')" style="margin-top:15px; font-weight:700; color:#666; cursor:pointer;">← Volver</div>
        </div>

    </div>

    <script>
        // SISTEMA DE AUDIO (Preparado para tus links de MP3)
        const audioPop = new Audio('https://www.soundjay.com/buttons/sounds/button-37a.mp3');
        let musicStarted = false;

        function startMagic() {
            if(!musicStarted) {
                // Aquí podrías poner un link a tu música de fondo
                console.log("Música iniciada");
                musicStarted = true;
            }
            createStar();
            playPop();
        }

        function playPop() { audioPop.currentTime = 0; audioPop.play(); }

        function createStar() {
            const layer = document.getElementById('magic-layer');
            const star = document.createElement('div');
            star.className = 'star';
            const colors = ['#FF6FB5', '#4FA8E8', '#FFE135', '#4ADE80', '#FFFFFF'];
            star.style.background = colors[Math.floor(Math.random()*colors.length)];
            star.style.left = Math.random() * window.innerWidth + 'px';
            star.style.top = Math.random() * window.innerHeight + 'px';
            star.style.width = star.style.height = (Math.random()*20 + 10) + 'px';
            layer.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }

        // Burbujas constantes
        setInterval(() => {
            const b = document.createElement('div');
            b.style.position = 'fixed';
            b.style.bottom = '-50px';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.width = b.style.height = Math.random() * 40 + 10 + 'px';
            b.style.background = 'rgba(255,255,255,0.3)';
            b.style.borderRadius = '50%';
            b.style.border = '1px solid white';
            b.style.transition = '5s linear';
            b.style.pointerEvents = 'none';
            document.body.appendChild(b);
            setTimeout(() => { b.style.transform = `translateY(-110vh) rotate(360deg)`; }, 100);
            setTimeout(() => b.remove(), 6000);
        }, 1000);

        const trans = {
            es: { num: "NÚMEROS", let: "ABC LETRAS", lvl: "Mis 10 Juegos" },
            en: { num: "NUMBERS", let: "ABC LETTERS", lvl: "My 10 Games" }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setLang(lang) {
            document.getElementById('txt-num').innerText = trans[lang].num;
            document.getElementById('txt-let').innerText = trans[lang].let;
            document.getElementById('lvl-title').innerText = trans[lang].lvl;
            showScreen('scr-main');
        }

        function goToLevels(type) { showScreen('scr-levels'); }
    </script>
</body>
</html>
