<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CandyEd 🍭 Real Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#FF6FB5;--blue:#4FA8E8;--yellow:#FFE135;--green:#4ADE80;--purple:#C084FC;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#FFF5F7 0%,#E0F7FA 100%);height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;}

/* --- ATMÓSFERA NATURAL --- */
#magic-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.train{position:fixed;bottom:10%;left:-300px;font-size:3.5rem;z-index:2;animation:trainWalk 15s linear infinite, trainRock 1s ease-in-out infinite;}
@keyframes trainWalk{0%{left:-300px;}100%{left:110%;}}
@keyframes trainRock{0%,100%{transform:rotate(0deg) translateY(0);}50%{transform:rotate(2deg) translateY(-5px);}}

.bubble-pro{position:fixed;border-radius:50%;background:rgba(255,255,255,0.4);border:2px solid white;z-index:3;pointer-events:auto;cursor:pointer;}

/* --- INTERFAZ --- */
.wrap{width:96vw;height:94vh;max-width:500px;background:rgba(255,255,255,0.85);backdrop-filter:blur(15px);border:8px solid white;border-radius:60px;display:flex;flex-direction:column;align-items:center;padding:25px;box-shadow:0 20px 50px rgba(0,0,0,0.05);position:relative;z-index:10;}
.screen{display:none;width:100%;flex-direction:column;align-items:center;flex:1;animation:pop 0.4s ease-out;}
.screen.active{display:flex;}
@keyframes pop{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}

.brand{font-family:'Fredoka One',cursive;font-size:3.5rem;background:linear-gradient(45deg,var(--pink),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
.grid{display:grid;gap:15px;width:100%;margin-top:20px;}
.card{background:white;border-radius:35px;border:4px solid white;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 0 rgba(0,0,0,0.05);cursor:pointer;height:120px;}
.card:active{transform:translateY(5px);box-shadow:0 5px 0 rgba(0,0,0,0.05);}

/* Botones de Navegación */
.nav-btn{background:var(--pink);color:white;border:none;border-radius:20px;padding:10px 20px;font-weight:900;cursor:pointer;margin-top:10px;box-shadow:0 5px 0 #d44d91;}
.top-back{position:absolute;top:20px;left:20px;font-size:1.5rem;cursor:pointer;z-index:20;}

/* Juego */
.q-box{background:white;padding:30px;border-radius:40px;width:100%;text-align:center;font-size:3rem;font-weight:900;margin-bottom:20px;border:5px solid var(--purple);}
.ans-btn{background:white;border:4px solid #eee;border-radius:25px;padding:20px;font-size:1.5rem;font-weight:900;cursor:pointer;box-shadow:0 8px 0 #eee;}
.ans-btn.correct{background:var(--green);color:white;border-color:white;}
</style>
</head>
<body>

<div id="magic-layer"></div>
<div class="train">🚂🚃🚃🚃🍭</div>

<div class="wrap">
    <div id="scr-lang" class="screen active">
        <h1 class="brand">CandyEd</h1>
        <div style="font-size:4rem">🦄</div>
        <div class="grid">
            <div class="card" onclick="setLang('es')" style="color:var(--pink)"><h1>🇪🇸</h1>ESPAÑOL</div>
            <div class="card" onclick="setLang('en')" style="color:var(--blue)"><h1>🇺🇸</h1>ENGLISH</div>
        </div>
    </div>

    <div id="scr-main" class="screen">
        <div class="top-back" onclick="showScreen('scr-lang')">🏠</div>
        <h1 class="brand">CandyEd</h1>
        <div class="grid" style="grid-template-columns:1fr 1fr;">
            <div class="card" onclick="setMode('num')"><h1>🔢</h1><span id="t-num"></span></div>
            <div class="card" onclick="setMode('let')"><h1>🔤</h1><span id="t-let"></span></div>
        </div>
    </div>

    <div id="scr-diff" class="screen">
        <div class="top-back" onclick="showScreen('scr-main')">⬅️</div>
        <h2 id="diff-h" style="margin-top:20px;"></h2>
        <div class="grid">
            <div class="card" onclick="setDiff('noob')" style="height:80px">🐣 <b id="d-n"></b></div>
            <div class="card" onclick="setDiff('mid')" style="height:80px">🚀 <b id="d-m"></b></div>
            <div class="card" onclick="setDiff('pro')" style="height:80px">🏆 <b id="d-p"></b></div>
        </div>
    </div>

    <div id="scr-list" class="screen">
        <div class="top-back" onclick="showScreen('scr-diff')">⬅️</div>
        <h2 id="list-h" style="margin-top:20px;color:var(--pink)"></h2>
        <div class="grid" id="games-grid" style="grid-template-columns:1fr 1fr; overflow-y:auto; padding-bottom:20px;"></div>
    </div>

    <div id="scr-game" class="screen">
        <div class="top-back" onclick="showScreen('scr-list')">⬅️</div>
        <div id="game-question" class="q-box"></div>
        <div id="game-options" class="grid" style="grid-template-columns:1fr 1fr;"></div>
    </div>
</div>

<script>
let lang = 'es', mode = 'num', diff = 'noob';
const T = {
    es:{num:'NÚMEROS',let:'LETRAS',n:'2-4 AÑOS',m:'5-7 AÑOS',p:'8-10 AÑOS',instr_n:'Toca el número',instr_l:'Toca la letra'},
    en:{num:'NUMBERS',let:'LETTERS',n:'2-4 YRS',m:'5-7 YRS',p:'8-10 YRS',instr_n:'Tap the number',instr_l:'Tap the letter'}
};

/* --- AUDIO ENGINE --- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let musicPlaying = false;

function playSound(freq, type='sine', dur=0.1) {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function startMusic() {
    if(musicPlaying) return; musicPlaying = true;
    setInterval(() => {
        if(musicPlaying) playSound(440, 'triangle', 0.2); // Melodía simple
    }, 1000);
}

/* --- LÓGICA --- */
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function setLang(l){
    lang=l; startMusic();
    document.getElementById('t-num').innerText=T[l].num; document.getElementById('t-let').innerText=T[l].let;
    document.getElementById('d-n').innerText=T[l].n; document.getElementById('d-m').innerText=T[l].m; document.getElementById('d-p').innerText=T[l].p;
    showScreen('scr-main'); playSound(600);
}

function setMode(m){ mode=m; document.getElementById('diff-h').innerText=T[lang][m]; showScreen('scr-diff'); playSound(700); }

function setDiff(d){ 
    diff=d; 
    const grid = document.getElementById('games-grid'); grid.innerHTML = '';
    document.getElementById('list-h').innerText = T[lang][mode];
    for(let i=1; i<=10; i++){
        const c = document.createElement('div'); c.className = 'card'; c.style.height='80px';
        c.innerHTML = `<b>${mode==='num'?'🔢':'🔤'} Juego ${i}</b>`;
        c.onclick = () => startGame();
        grid.appendChild(c);
    }
    showScreen('scr-list'); playSound(800);
}

function startGame(){
    loadTask();
    showScreen('scr-game');
}

function loadTask(){
    const q = document.getElementById('game-question');
    const o = document.getElementById('game-options'); o.innerHTML = '';
    
    if(mode === 'num'){
        let n = Math.floor(Math.random()*10);
        q.innerText = n;
        let opts = [n, (n+1)%10, (n+2)%10, (n+3)%10].sort(()=>Math.random()-0.5);
        opts.forEach(opt => {
            const b = document.createElement('button'); b.className='ans-btn'; b.innerText=opt;
            b.onclick = () => { if(opt===n){ b.classList.add('correct'); playSound(1000); setTimeout(loadTask,1000); } };
            o.appendChild(b);
        });
    } else {
        const letters = "ABCDEFGHIJ";
        let l = letters[Math.floor(Math.random()*letters.length)];
        q.innerText = l;
        let opts = [l, "K", "L", "M"].sort(()=>Math.random()-0.5);
        opts.forEach(opt => {
            const b = document.createElement('button'); b.className='ans-btn'; b.innerText=opt;
            b.onclick = () => { if(opt===l){ b.classList.add('correct'); playSound(1000); setTimeout(loadTask,1000); } };
            o.appendChild(b);
        });
    }
}

/* --- BURBUJAS Y ESTRELLAS --- */
function createBubble(){
    const b = document.createElement('div'); b.className='bubble-pro';
    const sz = Math.random()*50+20;
    b.style.width=b.style.height=sz+'px'; b.style.left=Math.random()*100+'vw'; b.style.bottom='-50px';
    b.onclick = () => { playSound(1200); b.remove(); };
    document.body.appendChild(b);
    b.animate([{transform:'translateY(0)'},{transform:'translateY(-110vh)'}], {duration:6000}).onfinish=()=>b.remove();
}
setInterval(createBubble, 3000);
</script>
</body>
</html>
