<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CandyEd 🍭</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#FF6FB5;--blue:#4FA8E8;--yellow:#FFE135;--green:#4ADE80;--purple:#C084FC;--orange:#FB923C;--red:#F87171;--teal:#2DD4BF;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(-45deg,#FFDEE9,#B5FFFC,#FFE135,#FDF2F8);background-size:400% 400%;animation:gradBG 12s ease infinite;display:flex;justify-content:center;align-items:center;}
@keyframes gradBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
#magic{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.train{position:fixed;bottom:8%;left:-600px;font-size:2.5rem;z-index:1;pointer-events:none;animation:trainGo 14s linear infinite;}
@keyframes trainGo{0%{left:-600px;}100%{left:110%;}}
.wrap{width:96vw;height:94vh;max-width:580px;background:rgba(255,255,255,0.78);backdrop-filter:blur(20px);border:5px solid white;border-radius:48px;display:flex;flex-direction:column;align-items:center;padding:14px 12px 10px;box-shadow:0 20px 60px rgba(0,0,0,0.15);position:relative;z-index:10;overflow:hidden;}
.screen{display:none;width:100%;flex-direction:column;align-items:center;flex:1;overflow:hidden;}
.screen.active{display:flex;animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes popIn{from{transform:scale(0.6) rotate(-4deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.brand{font-family:'Fredoka One',cursive;font-size:clamp(2.8rem,10vw,4.5rem);background:linear-gradient(135deg,var(--pink),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(2px 2px 0 rgba(255,255,255,0.9));line-height:1;letter-spacing:2px;}
.tagline{font-size:0.8rem;color:#999;font-weight:700;margin:3px 0 14px;text-align:center;}
.grid{display:grid;gap:11px;width:100%;}
.card{background:white;border-radius:26px;border:4px solid white;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 7px 0 rgba(0,0,0,0.09);cursor:pointer;transition:transform 0.08s,box-shadow 0.08s;position:relative;overflow:hidden;}
.card:active{transform:scale(0.93) translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.09);}
.card::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 25%,rgba(255,255,255,0.55),transparent 60%);pointer-events:none;}
/* LANG */
#scr-lang .card{height:88px;font-size:1.4rem;font-weight:900;}
.lang-es{border-bottom:7px solid var(--pink)!important;color:var(--pink);}
.lang-en{border-bottom:7px solid var(--blue)!important;color:var(--blue);}
/* MAIN */
#scr-main .grid{grid-template-columns:1fr 1fr;}
#scr-main .card{height:min(21vw,120px);}
.card-icon{font-size:clamp(1.8rem,6vw,2.8rem);}
.card-lbl{font-size:clamp(0.65rem,2.5vw,0.9rem);font-weight:900;color:#555;margin-top:3px;text-align:center;}
/* LEVELS */
.header{width:100%;display:flex;align-items:center;justify-content:center;padding:0 6px;margin-bottom:9px;position:relative;}
.header h2{font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,4.5vw,1.6rem);text-align:center;}
.back-btn{position:absolute;left:0;background:rgba(0,0,0,0.06);border:none;font-size:1.3rem;cursor:pointer;padding:5px 10px;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:900;}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;overflow-y:auto;flex:1;padding:2px 2px 4px;}
.games-grid .card{height:min(17vw,88px);}
.game-emoji{font-size:clamp(1.3rem,4.5vw,2rem);}
.game-name{font-size:clamp(0.58rem,2.2vw,0.75rem);font-weight:900;color:#666;text-align:center;padding:0 3px;line-height:1.2;margin-top:2px;}
/* GAME */
.score-bar{display:flex;align-items:center;gap:10px;margin-bottom:7px;width:100%;}
.score-hearts{font-size:1.1rem;letter-spacing:1px;}
.score-pts{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--purple);margin-left:auto;}
.progress-bar{width:100%;height:9px;background:rgba(0,0,0,0.08);border-radius:99px;overflow:hidden;margin-bottom:9px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:99px;transition:width 0.5s ease;}
.game-area{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;gap:10px;}
.question-box{background:white;border-radius:28px;padding:14px 16px;box-shadow:0 7px 0 rgba(0,0,0,0.08);text-align:center;width:100%;border:4px solid rgba(255,255,255,0.8);min-height:75px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.q-main{font-size:clamp(1.8rem,8vw,4rem);line-height:1.15;word-break:break-all;}
.q-sub{font-size:clamp(0.7rem,2.8vw,0.95rem);color:#999;font-weight:700;margin-top:4px;}
.answers-grid{display:grid;gap:9px;width:100%;}
.answers-grid.cols2{grid-template-columns:1fr 1fr;}
.ans-btn{background:white;border:none;border-radius:20px;padding:11px 6px;font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(0.8rem,3.2vw,1.1rem);cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.09);transition:transform 0.08s,box-shadow 0.08s;display:flex;align-items:center;justify-content:center;gap:5px;min-height:50px;}
.ans-btn:active{transform:scale(0.93) translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.09);}
.ans-btn.correct{background:var(--green)!important;color:white;animation:correctPop 0.4s ease;}
.ans-btn.wrong{background:var(--red)!important;color:white;animation:wrongShake 0.4s ease;}
@keyframes correctPop{0%{transform:scale(1);}50%{transform:scale(1.18);}100%{transform:scale(1);}}
@keyframes wrongShake{0%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}100%{transform:translateX(0);}}
/* SONG */
.song-lyrics{width:100%;flex:1;background:white;border-radius:22px;padding:14px;overflow-y:auto;box-shadow:0 5px 0 rgba(0,0,0,0.07);}
.lyric-line{font-size:clamp(0.95rem,3.8vw,1.3rem);font-weight:700;line-height:1.9;text-align:center;transition:color 0.3s,transform 0.3s,font-size 0.3s;}
.lyric-line.active{color:var(--pink);transform:scale(1.07);}
.song-controls{display:flex;gap:10px;margin-top:10px;width:100%;}
.song-btn{flex:1;height:50px;border:none;border-radius:18px;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.95rem;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.1);}
/* WIN */
#scr-win{justify-content:center;gap:8px;}
.win-emoji{font-size:clamp(4rem,14vw,7rem);animation:winBounce 0.55s ease infinite alternate;}
@keyframes winBounce{from{transform:translateY(0) rotate(-5deg);}to{transform:translateY(-18px) rotate(5deg);}}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,8vw,3.5rem);background:linear-gradient(135deg,var(--pink),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.win-sub{font-size:0.95rem;color:#888;font-weight:700;}
.pill-btn{border:none;border-radius:20px;padding:13px 0;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.1);width:220px;}
.pill-btn:active{transform:scale(0.93) translateY(3px);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:99px;}

<body>
<div id="magic"></div>
<div class="train">🚂🚃🎠🚃🍭🚃🦄🚃🌈</div>

      </div>
    </div>
    <div style="font-size:2rem;margin-top:10px;letter-spacing:6px;">⭐🌈🎊🦄🍭</div>
  </div>

  <!-- NIVELES / JUEGOS -->
  <div id="scr-levels" class="screen">

const AC = new (window.AudioContext || window.webkitAudioContext)();
const resumeAC = () => { if(AC.state === 'suspended') AC.resume(); };

function tono(freq, dur=0.15, tipo='sine', vol=0.25){
  resumeAC();
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = tipo; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function acorde(freqs, dur=0.18){ freqs.forEach((f,i) => setTimeout(()=>tono(f,dur,'sine',0.18), i*55)); }
function sfxCorrecto(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tono(f,0.25,'sine',0.22),i*100)); }
function sfxError(){ [330,220,180].forEach((f,i)=>setTimeout(()=>tono(f,0.18,'sawtooth',0.18),i*100)); }
function sfxClick(){ tono(700,0.06,'square',0.12); }
function sfxPop(){ acorde([523,659,784]); }
function sfxWhoosh(){ tono(1100,0.08,'sine',0.15); setTimeout(()=>tono(550,0.08,'sine',0.1),60); }
function sfxBoing(){ [280,480,380].forEach((f,i)=>setTimeout(()=>tono(f,0.07,'square',0.15),i*45)); }
function sfxEstrella(){ [880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>tono(f,0.11,'sine',0.18),i*75)); }
function sfxVictoria(){ [523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>tono(f,0.3,'sine',0.2),i*130)); }
function sfxFail(){ [400,300,200].forEach((f,i)=>setTimeout(()=>tono(f,0.2,'sawtooth',0.15),i*110)); }

const sfxAleatorios = [sfxPop, sfxWhoosh, sfxBoing, sfxEstrella,
  ()=>acorde([440,550,660]), ()=>acorde([330,440,550,660])];
function sfxRand(){ sfxAleatorios[Math.floor(Math.random()*sfxAleatorios.length)](); }

// ══════════════════════════════════════════
//  CANCIONES (texto + melodía sintetizada)
// ══════════════════════════════════════════
const CANCIONES = {

        'Y for Yogurt 🥛   Z for Zebra 🦓','',

// Melodías sintetizadas
const MELODIA_ABC  = [523,587,659,698,784,880,988,1047,988,880,784,698,659,587,523,659,784,880,784,659,523];
const MELODIA_NUM  = [523,659,784,880,784,659,523,440,523,659,784,880,988,1047,988,880,784,659,523];

let cancionActiva = false;
let cancionIdx = 0;
let timerCancion = null;
let timerMelodia = null;
let tipoCancionActual = '';

function abrirCancion(tipo){
  const lang = idiomaActual;
  const s = CANCIONES[lang][tipo];
  tipoCancionActual = tipo;
  document.getElementById('song-title').textContent = s.titulo;
  const el = document.getElementById('song-lyrics');
  el.innerHTML = s.letra.map((l,i) =>
    l === '' ? `<div style="height:10px"></div>` :
    `<div class="lyric-line" id="lyr-${i}">${l}</div>`
  ).join('');
  cancionIdx = 0; cancionActiva = false;
  const btn = document.getElementById('song-play-btn');
  btn.textContent = lang === 'es' ? '▶ Cantar' : '▶ Sing';
  sfxPop();
  showScreen('scr-song');
}

function toggleCancion(){
  if(!cancionActiva){ iniciarCancion(); }
  else { pararCancion(); }
}

function iniciarCancion(){
  cancionActiva = true;
  const lang = idiomaActual;
  document.getElementById('song-play-btn').textContent = lang==='es'?'⏸ Pausa':'⏸ Pause';
  tocarMelodia();
  avanzarLetra();
}

function tocarMelodia(){
  const mel = tipoCancionActual === 'abc' ? MELODIA_ABC : MELODIA_NUM;
  let mi = 0;
  if(timerMelodia) clearInterval(timerMelodia);
  timerMelodia = setInterval(()=>{
    if(!cancionActiva){ clearInterval(timerMelodia); return; }
    tono(mel[mi % mel.length], 0.28, 'sine', 0.13);
    mi++;
  }, 320);
}

function avanzarLetra(){
  if(!cancionActiva) return;
  const lang = idiomaActual;
  const letra = CANCIONES[lang][tipoCancionActual].letra;
  document.querySelectorAll('.lyric-line').forEach(l => l.classList.remove('active'));
  // Buscar próxima línea no vacía
  while(cancionIdx < letra.length && letra[cancionIdx] === '') cancionIdx++;
  if(cancionIdx >= letra.length){
    cancionActiva = false;
    clearInterval(timerMelodia);
    document.getElementById('song-play-btn').textContent = lang==='es'?'▶ Cantar':'▶ Sing';
    sfxVictoria(); confetti(30);
    return;
  }
  const el = document.getElementById('lyr-' + cancionIdx);
  if(el){ el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
  tono(400 + cancionIdx * 15, 0.12, 'sine', 0.08);
  cancionIdx++;
  timerCancion = setTimeout(avanzarLetra, 1300);
}

function pararCancion(){
  cancionActiva = false;
  clearInterval(timerMelodia);
  clearTimeout(timerCancion);
  document.querySelectorAll('.lyric-line').forEach(l => l.classList.remove('active'));
  const lang = idiomaActual;
  document.getElementById('song-play-btn').textContent = lang==='es'?'▶ Cantar':'▶ Sing';
}

let vidas, puntos, ronda, totalRondas, juegoActual, idiomaActual, categoriaActual;
const COLORES_BTN = ['#FF6FB5','#4FA8E8','#FFE135','#4ADE80','#C084FC','#FB923C','#2DD4BF','#F87171'];

function azar(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function mezclar(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function elegir(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function numsFalsos(correcto, cuantos=3, min=0, max=10){
  const s = new Set([correcto]);
  let intentos = 0;
  while(s.size < cuantos+1 && intentos < 50){
    const n = azar(min, max);
    if(n !== correcto) s.add(n);
    intentos++;
  }
  return mezclar([...s]);
}

function iniciarJuego(def){
  juegoActual = def;
  vidas = 3; puntos = 0; ronda = 0; totalRondas = 8;
  document.getElementById('game-title').textContent = def.nombre;
  actualizarHUD();
  showScreen('scr-game');
  proximaRonda();
}

function actualizarHUD(){
  document.getElementById('hearts').textContent = '❤️'.repeat(vidas) + '🖤'.repeat(3-vidas);
  document.getElementById('score-pts').textContent = puntos + ' ⭐';
  document.getElementById('prog').style.width = (ronda/totalRondas*100) + '%';
}

function proximaRonda(){
  if(ronda >= totalRondas){ mostrarVictoria(); return; }
  ronda++;
  actualizarHUD();
  document.getElementById('game-area').innerHTML = '';
  juegoActual.fn();
}

function renderPregunta(qMain, qSub, respuestas, idxCorrecto){
  const area = document.getElementById('game-area');
  const cols = respuestas.length <= 4 ? 'cols2' : '';
  area.innerHTML = `
    <div class="question-box">
      <div class="q-main">${qMain}</div>
      ${qSub ? `<div class="q-sub">${qSub}</div>` : ''}
    </div>
    <div class="answers-grid ${cols}" id="agrid"></div>
  `;
  const grid = document.getElementById('agrid');
  respuestas.forEach((r,i)=>{
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.style.borderBottom = `6px solid ${COLORES_BTN[i%COLORES_BTN.length]}`;
    btn.innerHTML = r;
    btn.onclick = () => verificar(btn, i === idxCorrecto);
    grid.appendChild(btn);
  });
}

function verificar(btn, correcto){
  document.querySelectorAll('.ans-btn').forEach(b => b.onclick = null);
  if(correcto){
    btn.classList.add('correct');
    puntos += 10;
    sfxCorrecto();
    mostrarFeedback(true);
    setTimeout(proximaRonda, 950);
  } else {
    btn.classList.add('wrong');
    vidas--;
    sfxError();
    mostrarFeedback(false);
    if(vidas <= 0) setTimeout(mostrarVictoria, 950);
    else setTimeout(proximaRonda, 950);
  }
  actualizarHUD();
}

function mostrarFeedback(correcto){
  const msgs = T[idiomaActual][correcto ? 'correcto' : 'incorrecto'];
  const fb = document.createElement('div');
  fb.textContent = elegir(msgs);
  fb.style.cssText = 'position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);font-family:Fredoka One,cursive;font-size:clamp(1.4rem,6vw,2.8rem);z-index:9999;pointer-events:none;text-shadow:2px 2px white;animation:popIn 0.3s ease;';
  document.body.appendChild(fb);
  confetti(correcto ? 28 : 6);
  setTimeout(()=>fb.remove(), 850);
}

function mostrarVictoria(){
  const t = T[idiomaActual];
  document.getElementById('win-title').textContent = t.winTitle;
  document.getElementById('win-sub').textContent = t.winSub + ' ' + puntos + ' ⭐';
  document.getElementById('win-stars').textContent = puntos>=60?'⭐⭐⭐':puntos>=40?'⭐⭐':'⭐';
  document.getElementById('win-emoji').textContent = puntos>=60?'🏆':puntos>=40?'🥈':'🎉';
  sfxVictoria(); confetti(55);
  showScreen('scr-win');
}

function repetirJuego(){ iniciarJuego(juegoActual); }

function j_contarEmojis(lang){
  const n = azar(1,10), e = elegir(EMOJIS_CONT);
  const display = e.repeat(n);
  const opts = numsFalsos(n,3,1,10);
  const ci = opts.indexOf(n);
  const words = lang==='es'?NUM_ES:NUM_EN;
  renderPregunta(display, lang==='es'?'¿Cuántos hay?':'How many?', opts.map(a=>a+' '+words[a]), ci);
}

function j_siguiente(lang){
  const n = azar(0,8), next = n+1;
  const opts = numsFalsos(next,3,0,10);
  const ci = opts.indexOf(next);
  renderPregunta(n+' → ❓', lang==='es'?'¿Cuál sigue?':'What comes next?', opts.map(String), ci);
}

function j_mayor(lang){
  const a = azar(0,8), b = azar(0,10);
  if(a===b){ j_mayor(lang); return; }
  const mayor = Math.max(a,b);
  const ans = mezclar([a.toString(), b.toString()]);
  const ci = ans.indexOf(mayor.toString());
  renderPregunta(a+' 🆚 '+b, lang==='es'?'¿Cuál es MAYOR?':'Which is BIGGER?', ans, ci);
}

function j_suma(lang){
  const a = azar(1,5), b = azar(1,5), s = a+b;
  const opts = numsFalsos(s,3,1,10);
  const ci = opts.indexOf(s);
  renderPregunta(a+' ➕ '+b+' = ❓', lang==='es'?'¡Suma!':'Add!', opts.map(String), ci);
}

function j_nombreNum(lang){
  const n = azar(1,10);
  const words = lang==='es'?NUM_ES:NUM_EN;
  const correcto = words[n];
  const incorrectos = mezclar(words.filter((_,i)=>i!==n)).slice(0,3);
  const opts = mezclar([correcto,...incorrectos]);
  const ci = opts.indexOf(correcto);
  const iconos = ['☀️','🌟','🎉','⭐','🍭','🌈','🚀','🦄','💎','🎊'];
  renderPregunta(n+' '+iconos[n-1], lang==='es'?'¿Cómo se llama?':'What is it called?', opts, ci);
}

function j_faltante(lang){
  const inicio = azar(1,7);
  const seq = [inicio, inicio+1, inicio+2];
  const mi = azar(0,2);
  const faltante = seq[mi];
  const display = seq.map((n,i)=>i===mi?'❓':n).join(' — ');
  const opts = numsFalsos(faltante,3,1,10);
  const ci = opts.indexOf(faltante);
  renderPregunta(display, lang==='es'?'¿Qué número falta?':'What number is missing?', opts.map(String), ci);
}

function j_emojiConteo(lang){
  const n = azar(2,8);
  const emojisSelec = mezclar(EMOJIS_CONT).slice(0,Math.min(n,EMOJIS_CONT.length));
  // Rellenar si n > emojis únicos
  let display = '';
  for(let i=0;i<n;i++) display += EMOJIS_CONT[i%EMOJIS_CONT.length];
  const opts = numsFalsos(n,3,1,10);
  const ci = opts.indexOf(n);
  renderPregunta(display, lang==='es'?'¿Cuántos emojis?':'How many emojis?', opts.map(String), ci);
}

function j_comparar(lang){
  const a = azar(0,9), b = azar(1,10);
  if(a===b){ j_comparar(lang); return; }
  const correcto = a>b?'>':'<';
  const opts = mezclar(['>', '<', '=']);
  const ci = opts.indexOf(correcto);
  renderPregunta(a+' __ '+b, lang==='es'?'Elige el símbolo correcto':'Choose the right symbol', opts, ci);
}

function j_resta(lang){
  const a = azar(3,9), b = azar(1,a), r = a-b;
  const opts = numsFalsos(r,3,0,8);
  const ci = opts.indexOf(r);
  renderPregunta(a+' ➖ '+b+' = ❓', lang==='es'?'¡Resta!':'Subtract!', opts.map(String), ci);
}

function j_mathTotal(lang){
  const tipo = azar(0,1);
  if(tipo===0){ j_suma(lang); } else { j_resta(lang); }
}

// ══════════════════════════════════════════
function getLData(lang){ return lang==='es'?LETRAS_ES:LETRAS_EN; }

function j_empiezaCon(lang){
  const data = getLData(lang);
  const item = elegir(data);
  const incorrectos = mezclar(data.filter(d=>d.l!==item.l)).slice(0,3);
  const opts = mezclar([item,...incorrectos]);
  const ci = opts.indexOf(item);
  renderPregunta(item.e, lang==='es'?`¿Qué letra empieza "${item.p}"?`:`"${item.p}" starts with?`, opts.map(o=>o.l), ci);
}

function j_mayusMinus(lang){
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const letra = ALPHA[azar(0,25)];
  const lower = letra.toLowerCase();
  const wrongU = mezclar([...ALPHA].filter(l=>l!==letra)).slice(0,3);
  const modo = Math.random()>0.5;
  if(modo){
    const opts = mezclar([lower,...wrongU.map(l=>l.toLowerCase())]);
    renderPregunta(letra, lang==='es'?'¿Cuál es la minúscula?':'Which is the lowercase?', opts, opts.indexOf(lower));
  } else {
    const opts = mezclar([letra,...wrongU]);
    renderPregunta(lower, lang==='es'?'¿Cuál es la mayúscula?':'Which is the uppercase?', opts, opts.indexOf(letra));
  }
}

function j_letraFalta(lang){
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const idx = azar(1,24);
  const prev = ALPHA[idx-1], curr = ALPHA[idx], next = ALPHA[idx+1];
  const wrongs = mezclar([...ALPHA].filter(l=>l!==curr)).slice(0,3);
  const opts = mezclar([curr,...wrongs]);
  renderPregunta(prev+' ❓ '+next, lang==='es'?'¿Qué letra falta?':'Which letter is missing?', opts, opts.indexOf(curr));
}

function j_primeraLetra(lang){
  const data = getLData(lang);
  const item = elegir(data);
  const incorrectos = mezclar(data.filter(d=>d.l!==item.l)).slice(0,3);
  const opts = mezclar([item,...incorrectos]);
  const ci = opts.indexOf(item);
  renderPregunta(item.e, lang==='es'?'¿Con qué letra empieza?':'What letter does it start with?', opts.map(o=>o.l+' '+o.e), ci);
}

function j_vocales(lang){
  const vocales = ['A','E','I','O','U'];
  const CONS = 'BCDFGHJKLMNPQRSTVWXYZ';
  const esVocal = Math.random()>0.5;
  const letra = esVocal ? elegir(vocales) : CONS[azar(0,CONS.length-1)];
  const opts = lang==='es' ? ['¡SÍ! 🌺','NO ❌'] : ['YES! 🌺','NO ❌'];
  renderPregunta(letra, lang==='es'?'¿Es una vocal?':'Is it a vowel?', opts, esVocal?0:1);
}

function j_ordenABC(lang){
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const idx = azar(1,24);
  const letra = ALPHA[idx];
  const modo = Math.random()>0.5?'after':'before';
  const correcto = modo==='after'?ALPHA[idx+1]:ALPHA[idx-1];
  const wrongs = mezclar([...ALPHA].filter(l=>l!==correcto&&l!==letra)).slice(0,3);
  const opts = mezclar([correcto,...wrongs]);
  renderPregunta(letra,
    lang==='es'?(modo==='after'?'¿Cuál letra va DESPUÉS?':'¿Cuál letra va ANTES?'):
    (modo==='after'?'Which letter comes AFTER?':'Which letter comes BEFORE?'),
    opts, opts.indexOf(correcto));
}

function j_letraImagen(lang){
  const data = getLData(lang);
  const item = elegir(data);
  const incorrectos = mezclar(data.filter(d=>d.e!==item.e)).slice(0,3);
  const opts = mezclar([item,...incorrectos]);
  const ci = opts.indexOf(item);
  renderPregunta(item.l, lang==='es'?'¿Cuál imagen empieza con esta letra?':'Which image starts with this letter?', opts.map(o=>o.e), ci);
}

function j_contarLetras(lang){
  const palabras_es = ['casa','gato','sol','luna','amor','pizza','tren','azul','niño','rey','flor','mesa'];
  const palabras_en = ['cat','sun','love','moon','fish','rain','tree','star','cake','frog','bird','blue'];
  const lista = lang==='es'?palabras_es:palabras_en;
  const palabra = elegir(lista);
  const count = palabra.length;
  const opts = numsFalsos(count,3,2,8);
  const ci = opts.indexOf(count);
  renderPregunta(palabra.toUpperCase(), lang==='es'?'¿Cuántas letras tiene?':'How many letters?', opts.map(String), ci);
}

function j_completaPalabra(lang){
  const data = getLData(lang);
  const item = elegir(data);
  const palabra = item.p;
  const idx = azar(1, palabra.length-1);
  const faltante = palabra[idx].toUpperCase();
  const display = palabra.split('').map((c,i)=>i===idx?'_':c).join('').toUpperCase();
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const wrongs = mezclar([...ALPHA].filter(l=>l!==faltante)).slice(0,3);
  const opts = mezclar([faltante,...wrongs]);
  renderPregunta(item.e+'  '+display, lang==='es'?'¿Qué letra falta?':'Which letter is missing?', opts, opts.indexOf(faltante));
}

function j_deletrear(lang){
  const data = getLData(lang);
  const item = elegir(data);
  const incorrectos = mezclar(data.filter(d=>d.p!==item.p)).slice(0,3);
  const opts = mezclar([item,...incorrectos]);
  const ci = opts.indexOf(item);
  renderPregunta(item.e, lang==='es'?'¿Cómo se escribe?':'How do you spell it?', opts.map(o=>o.p), ci);
}

function goToLevels(cat){

  const lang = idiomaActual;
  const juegos = juegosDef(cat, lang);
  document.getElementById('lvl-title').textContent = cat==='num'?T[lang].lvlNum:T[lang].lvlLet;
  document.getElementById('lvl-title').style.color = cat==='num'?'var(--pink)':'var(--blue)';
  const grid = document.getElementById('games-grid');
  grid.innerHTML = '';
  const colores = ['var(--pink)','var(--blue)','var(--yellow)','var(--green)','var(--purple)',
                   'var(--orange)','var(--teal)','var(--red)','#FCA5A5','#A5F3FC'];
  juegos.forEach((j,i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderBottom = `6px solid ${colores[i]}`;
    card.innerHTML = `<span class="game-emoji">${j.emoji}</span><span class="game-name">${j.nombre}</span>`;
    card.onclick = ()=>{ sfxRand(); iniciarJuego(j); };
    grid.appendChild(card);
  });
  sfxPop();
  showScreen('scr-levels');
}

// ══════════════════════════════════════════
//  EFECTOS VISUALES
// ══════════════════════════════════════════
function confetti(n=20){
  const colores=['#FF6FB5','#4FA8E8','#FFE135','#4ADE80','#C084FC','#FB923C'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      const sz=azar(6,14);
      p.style.cssText=`position:fixed;left:${azar(10,90)}vw;top:${azar(5,35)}vh;
        width:${sz}px;height:${sz}px;border-radius:${Math.random()>0.5?'50%':'3px'};
        background:${elegir(colores)};transform:rotate(${azar(0,360)}deg);
        z-index:9998;pointer-events:none;animation:confCaer 1.6s ease forwards;`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),1700);
    },i*28);
  }
}

// Burbujas flotantes
setInterval(()=>{
  const b=document.createElement('div');
  const sz=azar(12,48);
  b.style.cssText=`position:fixed;bottom:-55px;left:${Math.random()*100}vw;
    width:${sz}px;height:${sz}px;border-radius:50%;
    background:rgba(255,255,255,0.22);border:1.5px solid rgba(255,255,255,0.5);
    pointer-events:none;z-index:0;`;
  document.getElementById('magic').appendChild(b);
  b.animate([
    {transform:'translateY(0) scale(1)',opacity:0.5},
    {transform:`translateY(-105vh) scale(${0.4+Math.random()*0.8})`,opacity:0}
  ],{duration:4500+Math.random()*3500,easing:'linear'}).onfinish=()=>b.remove();
},1400);

// Chispa en cada tap
const SPARK_EMOJIS=['⭐','✨','🌟','💫','🎉','🎊','🍭','🌈','💥','🔥'];
document.addEventListener('click',(e)=>{
  resumeAC();
  const s=document.createElement('div');
  s.textContent=elegir(SPARK_EMOJIS);
  s.style.cssText=`position:fixed;left:${e.clientX-16}px;top:${e.clientY-16}px;
    font-size:1.4rem;pointer-events:none;z-index:9999;
    animation:sparkVolar 0.75s ease forwards;`;
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),760);
});

// CSS dinámico para animaciones
const styleExtra=document.createElement('style');
styleExtra.textContent=`
@keyframes sparkVolar{0%{transform:scale(0) translateY(0);opacity:1;}100%{transform:scale(1.6) translateY(-55px);opacity:0;}}
@keyframes confCaer{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(65vh) rotate(720deg);opacity:0;}}
`;
document.head.appendChild(styleExtra);

// Idioma inicial por defecto (se sobreescribe con setLang)
idiomaActual = 'es';
</script>
