<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CandyEd 🍭</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(-45deg,#FFDEE9,#B5FFFC,#FFE135,#FDF2F8);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
button{
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  margin:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div>
  <button onclick="playSound()">🔊 Probar Sonido</button>
  <button onclick="toggleMusic()">🎵 Música ON/OFF</button>
</div>

<script>
/* =========================
   🎧 AUDIO ENGINE FIXED
========================= */
const AC = new (window.AudioContext || window.webkitAudioContext)();

let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;

  const buffer = AC.createBuffer(1, 1, 22050);
  const source = AC.createBufferSource();
  source.buffer = buffer;
  source.connect(AC.destination);

  if (source.start) source.start(0);

  if (AC.state === 'suspended') {
    AC.resume();
  }

  audioUnlocked = true;
  console.log("🔊 Audio desbloqueado");
}

/* activar en primer toque */
document.body.addEventListener('touchstart', unlockAudio, { once: true });
document.body.addEventListener('click', unlockAudio, { once: true });

/* =========================
   🔊 SONIDOS
========================= */
function tono(freq, dur=0.2){
  if(!audioUnlocked) return;

  const o = AC.createOscillator();
  const g = AC.createGain();

  o.connect(g);
  g.connect(AC.destination);

  o.frequency.value = freq;

  g.gain.setValueAtTime(0.2, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);

  o.start();
  o.stop(AC.currentTime + dur);
}

function playSound(){
  tono(800,0.2);
}

/* =========================
   🎵 MÚSICA ESTABLE
========================= */
let musicOn = false;
let musicIndex = 0;
let musicTimer = null;

const melody = [
  {n:523,d:0.4},
  {n:659,d:0.4},
  {n:784,d:0.4},
  {n:659,d:0.4},
  {n:523,d:0.6}
];

function playMusicNote(freq,dur){
  if(!musicOn || !audioUnlocked) return;

  const o = AC.createOscillator();
  const g = AC.createGain();

  o.connect(g);
  g.connect(AC.destination);

  o.type = "triangle";
  o.frequency.value = freq;

  g.gain.setValueAtTime(0.1, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);

  o.start();
  o.stop(AC.currentTime + dur);
}

function loopMusic(){
  if(!musicOn) return;

  const note = melody[musicIndex % melody.length];

  try{
    playMusicNote(note.n, note.d);
  }catch(e){
    console.warn("Audio error", e);
  }

  musicIndex++;

  musicTimer = setTimeout(()=>{
    if(musicOn) loopMusic();
  }, note.d * 1000);
}

function toggleMusic(){
  musicOn = !musicOn;

  if(musicOn){
    loopMusic();
  } else {
    clearTimeout(musicTimer);
  }
}

/* =========================
   ⚡ CONTROL DE SPAM AUDIO
========================= */
let lastClickSound = 0;

document.addEventListener('click', ()=>{
  const now = Date.now();

  if(now - lastClickSound > 120){
    tono(600,0.1);
    lastClickSound = now;
  }
});

/* =========================
   🫧 EFECTOS OPTIMIZADOS
========================= */
const isLowPerf = navigator.hardwareConcurrency <= 2;

if(!isLowPerf){
  setInterval(()=>{
    const b = document.createElement('div');
    const size = Math.random()*20 + 10;

    b.style.position = "fixed";
    b.style.bottom = "-50px";
    b.style.left = Math.random()*100 + "vw";
    b.style.width = size + "px";
    b.style.height = size + "px";
    b.style.borderRadius = "50%";
    b.style.background = "rgba(255,255,255,0.3)";

    document.body.appendChild(b);

    b.animate([
      {transform:"translateY(0)",opacity:1},
      {transform:"translateY(-100vh)",opacity:0}
    ],{
      duration:4000,
      easing:"linear"
    }).onfinish = ()=> b.remove();

  },2000);
}
</script>

</body>
</html>
