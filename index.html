<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CandyEd PRO 🍭</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(-45deg,#ff9ad5,#a0f0ff,#fff59d,#ffd1dc);
  background-size:400% 400%;
  animation:bg 10s infinite;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* 🎴 3D CARDS */
.card{
  width:120px;
  height:120px;
  background:white;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:20px;
  font-size:40px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  transform:perspective(600px) rotateX(10deg);
  transition:0.2s;
}
.card:active{
  transform:perspective(600px) rotateX(0deg) scale(0.9);
}

/* 🚂 TREN RANDOM */
.train{
  position:fixed;
  font-size:40px;
  pointer-events:none;
}

/* 🎈 GLOBOS */
.balloon{
  position:fixed;
  font-size:30px;
  animation:float 6s linear forwards;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-120vh);}
}

/* 🌠 ESTRELLAS */
.star{
  position:fixed;
  font-size:20px;
  animation:shoot 1s linear forwards;
}
@keyframes shoot{
  from{transform:translate(0,0);}
  to{transform:translate(200px,-200px);opacity:0;}
}

</style>
</head>

<body>

<div style="display:flex;justify-content:center;flex-wrap:wrap;">
  <div class="card" onclick="clickSound()">🍭</div>
  <div class="card" onclick="playABC()">🔤</div>
</div>

<div id="train" class="train">🚂🚃🍭🦄🌈</div>

<script>
/* ================= AUDIO PRO ================= */
const AC = new (window.AudioContext||window.webkitAudioContext)();
let unlocked=false;

function unlock(){
  if(unlocked) return;
  const b=AC.createBuffer(1,1,22050);
  const s=AC.createBufferSource();
  s.buffer=b;
  s.connect(AC.destination);
  s.start(0);
  AC.resume();
  unlocked=true;
}

document.body.addEventListener('click',unlock,{once:true});
document.body.addEventListener('touchstart',unlock,{once:true});

/* 🎵 TONO */
function tone(f,d=0.2){
  if(!unlocked) return;
  const o=AC.createOscillator();
  const g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.frequency.value=f;
  g.gain.setValueAtTime(0.2,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
  o.start(); o.stop(AC.currentTime+d);
}

/* 🎉 SONIDOS DIVERTIDOS */
function clickSound(){
  const sounds=[
    ()=>tone(800,0.1),
    ()=>{tone(400);setTimeout(()=>tone(900),50)},
    ()=>{tone(300);setTimeout(()=>tone(1200),80)},
    ()=>{tone(1000,0.05);tone(1200,0.05)},
  ];
  sounds[Math.floor(Math.random()*sounds.length)]();
}

/* ================= 🎵 ABC 5 VERSIONES ================= */
const abcMelodies=[
  [523,587,659,698,784,880,988],
  [523,659,784,1047,784,659],
  [392,523,659,784,659],
  [523,523,659,659,784,784],
  [659,784,1047,784,659]
];

let version=0;

function playABC(){
  const notes=abcMelodies[version%5];
  version++;

  let i=0;
  let timer=setInterval(()=>{
    tone(notes[i%notes.length],0.25);
    i++;
    if(i>20) clearInterval(timer);
  },300);
}

/* ================= 🚂 TREN RANDOM ================= */
function moveTrain(){
  const t=document.getElementById("train");
  const x=Math.random()*window.innerWidth;
  const y=Math.random()*window.innerHeight;

  t.style.left=x+"px";
  t.style.top=y+"px";

  setTimeout(moveTrain,3000);
}
moveTrain();

/* ================= 🎈 GLOBOS ================= */
setInterval(()=>{
  const b=document.createElement("div");
  b.className="balloon";
  b.innerText="🎈";
  b.style.left=Math.random()*100+"vw";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),6000);
},1200);

/* ================= 🌠 ESTRELLAS ================= */
document.addEventListener("click",(e)=>{
  const s=document.createElement("div");
  s.className="star";
  s.innerText="✨";
  s.style.left=e.clientX+"px";
  s.style.top=e.clientY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});

</script>

</body>
</html>
