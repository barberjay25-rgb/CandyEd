<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyEd - Aprendizaje Divertido</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #FF8EBC; --blue: #7DD3FC; --yellow: #FFD93D; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: #FDF2F8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 100%);
        }
        .app-container {
            width: 92vw; height: 90vh;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 6px solid white;
            border-radius: 50px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        
        /* EL PERSONAJE CUBO */
        .character-box {
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }
        .character-box:active { transform: scale(1.2) rotate(5deg); }
        
        .brand-name {
            font-size: 4rem;
            background: linear-gradient(45deg, #FF6FB5, #4FA8E8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .slogan { font-size: 1.2rem; color: #64748b; font-weight: 700; margin-top: -5px; }

        .game-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; width: 100%; max-width: 500px; margin-top: 30px;
        }
        .card {
            background: white; height: 150px; border-radius: 35px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 1.3rem; font-weight: 700; box-shadow: 0 10px 0 #E2E8F0;
            transition: all 0.1s; border: 4px solid white; cursor: pointer;
        }
        .card:active { transform: translateY(6px); box-shadow: 0 4px 0 #E2E8F0; }
        .card.num { color: var(--pink); border-bottom: 6px solid var(--pink); }
        .card.let { color: var(--blue); border-bottom: 6px solid var(--blue); }
        .card-icon { font-size: 3rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <div class="character-box" onclick="characterPop()">
            <svg width="120" height="120" viewBox="0 0 100 100">
                <rect x="15" y="25" width="70" height="60" rx="20" fill="#FFD1DC" stroke="white" stroke-width="3"/>
                <circle cx="35" cy="55" r="4" fill="#444"/>
                <circle cx="65" cy="55" r="4" fill="#444"/>
                <circle cx="28" cy="62" r="5" fill="#FF91A4" opacity="0.5"/>
                <circle cx="72" cy="62" r="5" fill="#FF91A4" opacity="0.5"/>
                <path d="M 42 72 Q 50 78 58 72" stroke="#444" stroke-width="3" fill="none" stroke-linecap="round"/>
                <line x1="50" y1="25" x2="50" y2="10" stroke="#FFB6C1" stroke-width="3"/>
                <circle cx="50" cy="8" r="5" fill="#FFD93D"/>
            </svg>
        </div>
        
        <h1 class="brand-name">CandyEd</h1>
        <p class="slogan">aprendizaje divertido</p>

        <div class="game-grid">
            <div class="card num">
                <span class="card-icon">🔢</span>
                NÚMEROS
            </div>
            <div class="card let">
                <span class="card-icon">ABC</span>
                LETRAS
            </div>
        </div>
    </div>

    <script>
        function characterPop() {
            console.log("¡Hola! Soy CandyEd");
        }

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<20; i++) {
                particles.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                    size: Math.random()*15+5, color: `hsla(${Math.random()*360}, 70%, 85%, 0.4)`
                });
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.color; ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
