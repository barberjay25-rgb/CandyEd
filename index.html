<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyEd - Aprendizaje Divertido</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF8EBC;
            --blue: #7DD3FC;
            --yellow: #FFD93D;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: #FDF2F8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #FDF2F8 0%, #E0F2FE 100%);
        }
        .app-container {
            width: 92vw;
            height: 88vh;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 6px solid white;
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        .logo-area {
            text-align: center;
            margin: 20px 0 40px;
            animation: bounce 4s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .brand-name {
            font-size: 4.5rem;
            background: linear-gradient(45deg, #FF6FB5, #4FA8E8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .slogan {
            font-size: 1.2rem;
            color: #64748b;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }
        .card {
            background: white;
            height: 160px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #475569;
            box-shadow: 0 12px 0 #E2E8F0, 0 20px 30px rgba(0,0,0,0.05);
            transition: all 0.1s;
            border: 4px solid white;
            cursor: pointer;
        }
        /* Efecto de presión para móvil */
        .card:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #E2E8F0, 0 10px 20px rgba(0,0,0,0.1);
        }
        .card.num { border-bottom: 8px solid var(--pink); color: var(--pink); }
        .card.let { border-bottom: 8px solid var(--blue); color: var(--blue); }
        
        .icon { font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app-container">
        <div class="logo-area">
            <h1 class="brand-name">CandyEd</h1>
            <p class="slogan">aprendizaje divertido</p>
        </div>
        <div class="game-grid">
            <div class="card num" onclick="playEffect()">
                <span class="icon">🔢</span>
                NÚMEROS
            </div>
            <div class="card let" onclick="playEffect()">
                <span class="icon">ABC</span>
                LETRAS
            </div>
        </div>
    </div>
    <script>
        // Efecto visual al tocar
        function playEffect() {
            // Aquí añadiremos sonidos en el futuro
            console.log("¡Click mágico!");
        }

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<25; i++) {
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5),
                    vy: (Math.random()-0.5),
                    size: Math.random()*15+5,
                    color: `hsla(${Math.random()*360}, 70%, 80%, 0.3)`
                });
            }
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        init(); draw();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
