<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>CandyEd 🍭 Play Store Level</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-pastel: #EAE6FE; /* Lila clarito de la imagen */
            --pink: #FF85C0; --pink-dark: #D15B96;
            --blue: #6BCBFF; --blue-dark: #4A9CCC;
            --yellow: #FFDE59; --yellow-dark: #D4B63A;
            --green: #7ED957; --green-dark: #58A33A;
            --purple: #B088F9; --purple-dark: #865DCE;
            --orange: #FF914D; --orange-dark: #C9662C;
            --text: #4A4A4A;
            --white-glass: rgba(255, 255, 255, 0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { 
            font-family: 'Nunito', sans-serif; color: var(--text);
            background: linear-gradient(135deg, #FFDEE9, #EAE6FE, #D4FCFF, #FFF4E6); 
            background-size: 400% 400%; animation: gradBG 15s ease infinite; 
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }
        @keyframes gradBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* TREN DE FONDO */
        .train-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .train { position: absolute; font-size: 3.5rem; left: -300px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); animation: trainTravel 18s linear infinite; }
        @keyframes trainTravel { 0% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(60vw) rotate(2deg); } 100% { transform: translateX(150vw) rotate(0deg); } }

        /* CONTENEDOR PRINCIPAL - ESTILO CONSOLA MÓVIL */
        .wrap { 
            width: 96vw; height: 96vh; max-width: 500px; 
            background: var(--bg-pastel); 
            border: 8px solid white; border-radius: 40px; 
            display: flex; flex-direction: column; align-items: center; padding: 20px 15px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.8); 
            position: relative; z-index: 10; 
        }
        
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding-bottom: 20px; }
        .screen::-webkit-scrollbar { display: none; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* TITULOS Y LOGOS */
        .brand { 
            font-family: 'Fredoka One', cursive; font-size: 3.8rem; text-align: center;
            background: linear-gradient(to bottom, #FF85C0, #B088F9); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0px 5px 2px rgba(255,255,255,0.8)) drop-shadow(0px 8px 4px rgba(0,0,0,0.1)); 
            margin-bottom: 10px; line-height: 1.1;
        }
        .subtitle { font-family: 'Fredoka One', cursive; color: var(--blue-dark); font-size: 1.4rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* BOTONES DE NAVEGACIÓN Y HUD */
        .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; z-index: 20; }
        .nav-btn { 
            background: white; border: 4px solid #E0E0E0; border-radius: 20px; width: 55px; height: 55px; 
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 6px 0 #D1D1D1; transition: 0.1s; display: flex; justify-content: center; align-items: center;
        }
        .nav-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #D1D1D1; }
        
        .hud-progress { background: white; padding: 10px 20px; border-radius: 20px; font-weight: 900; font-size: 1.2rem; color: var(--purple-dark); border: 4px solid var(--purple); box-shadow: 0 6px 0 var(--purple-dark); }

        /* TARJETAS Y GRID */
        .grid { display: grid; gap: 15px; width: 100%; }
        .card { 
            background: white; border-radius: 25px; border: 4px solid white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-shadow: 0 8px 0 #D1D1D1; cursor: pointer; transition: 0.1s; 
            min-height: 110px; padding: 15px; text-align: center; font-weight: 900; font-size: 1.2rem; position: relative;
        }
        .card:active { transform: translateY(8px); box-shadow: 0 0 0 #D1D1D1; }
        .card.main-cat { flex-direction: row; gap: 15px; border: 4px solid; min-height: 90px; }
        
        /* ZONA DE JUEGO */
        .mascot-area { font-size: 5rem; animation: bop 1s infinite alternate; filter: drop-shadow(0 10px 5px rgba(0,0,0,0.2)); margin: 10px 0; }
        @keyframes bop { from { transform: scale(1); } to { transform: scale(1.08); } }
        
        .q-card { 
            background: white; border-radius: 35px; width: 100%; padding: 30px 10px; text-align: center; 
            font-size: 4.5rem; font-weight: 900; border: 6px solid var(--blue); margin-bottom: 20px; 
            box-shadow: 0 10px 0 var(--blue-dark); color: var(--text);
        }
        
        .ans-btn { 
            background: white; border: 4px solid white; border-radius: 25px; padding: 20px 10px; 
            font-size: 2.2rem; font-weight: 900; font-family: 'Nunito'; cursor: pointer; 
            box-shadow: 0 8px 0 #D1D1D1; transition: 0.1s; color: var(--text);
        }
        .ans-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #D1D1D1; }
        .ans-btn.correct { background: var(--green); color: white; border-color: var(--green); box-shadow: 0 8px 0 var(--green-dark); animation: pop 0.3s; }
        .ans-btn.wrong { background: var(--orange); color: white; border-color: var(--orange); box-shadow: 0 8px 0 var(--orange-dark); animation: shake 0.4s; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* PANTALLA VICTORIA EPICA */
        .trophy { font-size: 8rem; animation: floatTrophy 2s ease-in-out infinite, glow 2s infinite alternate; margin: 20px 0; }
        @keyframes floatTrophy { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px) scale(1.1); } }
        @keyframes glow { from { filter: drop-shadow(0 0 10px var(--yellow)); } to { filter: drop-shadow(0 0 40px var(--yellow)); } }
        .win-title { font-family: 'Fredoka One'; font-size: 3rem; color: var(--pink-dark); text-align: center; line-height: 1.1; margin-bottom: 10px; }
        
        .confetti { position: absolute; width: 15px; height: 15px; background-color: var(--pink); border-radius: 4px; animation: fall 3s linear forwards; z-index: 100; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body onclick="initAudio()">

<div class="train-container">
    <div class="train" id="bg-train">🚂🚃🚃🍭</div>
</div>

<div class="wrap">
    <div id="scr-home" class="screen active" style="justify-content: center;">
        <h1 class="brand">CANDY<br><span style="font-size: 1.5rem; color: var(--pink-dark); font-family: 'Nunito'; text-shadow: none;">Educational Edition</span></h1>
        
        <h2 class="subtitle" style="margin-top: 15px;">Selecciona el Nivel</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <div class="card" onclick="setDiff('noob', 1, 10)" style="border-color: var(--pink); color: var(--pink-dark); min-height: 80px; padding: 10px;">
                <span style="font-size: 2rem;">🐣</span><br><span style="font-size: 0.9rem;">APRENDIZ<br>(10x)</span>
            </div>
            <div class="card" onclick="setDiff('mid', 2, 15)" style="border-color: var(--blue); color: var(--blue-dark); min-height: 80px; padding: 10px;">
                <span style="font-size: 2rem;">🚀</span><br><span style="font-size: 0.9rem;">AVANZADO<br>(15x)</span>
            </div>
            <div class="card" onclick="setDiff('pro', 3, 20)" style="border-color: var(--orange); color: var(--orange-dark); min-height: 80px; padding: 10px;">
                <span style="font-size: 2rem;">🔥</span><br><span style="font-size: 0.9rem;">EXPERTO<br>(20x)</span>
            </div>
        </div>
    </div>

    <div id="scr-modes" class="screen">
        <div class="top-bar">
            <button class="nav-btn" onclick="showScreen('scr-home')">⬅️</button>
        </div>
        <h2 class="subtitle">Juegos Principales</h2>
        <div class="grid" style="grid-template-columns: 1fr;">
            <div class="card main-cat" onclick="setMode('num')" style="border-color: var(--blue); color: var(--blue-dark);">
                <span style="font-size: 3rem;">🎪</span> <span style="font-size: 1.8rem;">Circo de Números</span>
            </div>
            <div class="card main-cat" onclick="setMode('let')" style="border-color: var(--purple); color: var(--purple-dark);">
                <span style="font-size: 3rem;">🎨</span> <span style="font-size: 1.8rem;">Pinta Letras</span>
            </div>
        </div>
    </div>

    <div id="scr-list" class="screen">
        <div class="top-bar">
            <button class="nav-btn" onclick="showScreen('scr-modes')">⬅️</button>
        </div>
        <h2 id="list-title" class="subtitle" style="color:var(--purple-dark);"></h2>
        <div class="grid" id="game-items" style="grid-template-columns: 1fr 1fr;"></div>
    </div>

    <div id="scr-game" class="screen">
        <div class="top-bar">
            <button class="nav-btn" onclick="showScreen('scr-list')">⬅️</button>
            <div class="hud-progress" id="hud-score">⭐ 0 / 10</div>
        </div>
        <div id="m-emoji" class="mascot-area">🤖</div>
        <div id="q-card" class="q-card"></div>
        <div id="ans-grid" class="grid" style="grid-template-columns: 1fr 1fr;"></div>
    </div>

    <div id="scr-win" class="screen" style="justify-content: center; overflow: hidden; position: relative;">
        <h1 class="win-title">¡LO LOGRASTE,<br>CAMPEÓN!</h1>
        <div class="trophy">🏆</div>
        <h2 style="color: var(--blue-dark); font-size: 1.5rem; text-align: center; margin-bottom: 30px;">¡NIVEL COMPLETADO!</h2>
        <button class="ans-btn" onclick="showScreen('scr-home')" style="width: 80%; background: var(--pink); border-color: var(--pink); color: white; box-shadow: 0 8px 0 var(--pink-dark);">Jugar de Nuevo</button>
    </div>
</div>

<script>
// --- VARIABLES GLOBALES Y LÓGICA DE PROGRESO ---
let mode = 'num', diffMult = 1;
let currentTarget = 10, currentScore = 0, currentGameId = 1;

const TITLES = {
    num: ['Cuenta', 'Suma', 'Resta', 'Mayor', 'Menor', 'Siguiente', 'Anterior', 'Pares', 'Falta', 'Dobles'],
    let: ['Letra', 'Vocales', 'ABC', 'Rimas', 'Adivina', 'Mayúsculas', 'Minúsculas', 'Palabras', 'Lectura', 'Escritura']
};
const EMOJIS = ['🍎','🐶','🚗','⭐','🍓','🎈','🦖','🦋', '🍭', '🧸'];

// --- MOTOR DE AUDIO GENERATIVO ---
const AC = new (window.AudioContext || window.webkitAudioContext)();
let audioInit = false;

function initAudio() {
    if(AC.state === 'suspended') AC.resume();
    audioInit = true;
}

function playNote(freq, dur=0.2, type='triangle', vol=0.1) {
    if(!audioInit) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
}

function playWinFanfare() {
    setTimeout(()=>playNote(523.25, 0.2, 'square', 0.15), 0);   // Do
    setTimeout(()=>playNote(659.25, 0.2, 'square', 0.15), 200); // Mi
    setTimeout(()=>playNote(783.99, 0.2, 'square', 0.15), 400); // Sol
    setTimeout(()=>playNote(1046.50, 0.6, 'square', 0.2), 600); // Do Alto
}

// --- TREN LOOP ---
const train = document.getElementById('bg-train');
train.addEventListener('animationiteration', () => {
    train.style.top = Math.floor(Math.random() * 80) + '%';
    train.style.animationDuration = Math.floor(Math.random() * 8 + 15) + 's';
    train.innerText = `🚂${'🚃'.repeat(Math.floor(Math.random() * 4 + 1))}🍭`;
});

// --- NAVEGACIÓN ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id !== 'scr-win') playNote(800, 0.1, 'sine', 0.05);
}

function setDiff(dif, mult, target) {
    diffMult = mult; currentTarget = target;
    showScreen('scr-modes');
}

function setMode(m) {
    mode = m;
    document.getElementById('list-title').innerText = m === 'num' ? 'CIRCO DE NÚMEROS' : 'PINTA LETRAS';
    const container = document.getElementById('game-items'); container.innerHTML = '';
    const colors = ['var(--pink)', 'var(--blue)', 'var(--green)', 'var(--orange)', 'var(--purple)'];
    
    TITLES[m].forEach((name, i) => {
        const c = document.createElement('div'); c.className = 'card';
        c.style.color = colors[i % colors.length];
        c.style.borderColor = colors[i % colors.length];
        c.innerHTML = `<span style="font-size:2rem;">${m==='num'?'🔢':'🔤'}</span><b style="font-size:1.1rem; margin-top:5px;">${name}</b>`;
        c.onclick = () => { currentGameId = i+1; currentScore = 0; startGameUI(); };
        container.appendChild(c);
    });
    showScreen('scr-list');
}

// --- LÓGICA DE JUEGO ---
function startGameUI() {
    updateHUD();
    document.getElementById('m-emoji').innerText = ['🤖','🦄','🐙','🦕'][Math.floor(Math.random()*4)];
    generateGame();
    showScreen('scr-game');
}

function updateHUD() {
    document.getElementById('hud-score').innerText = `⭐ ${currentScore} / ${currentTarget}`;
}

function triggerWin() {
    showScreen('scr-win');
    playWinFanfare();
    // Confeti generator
    for(let i=0; i<60; i++) {
        const c = document.createElement('div'); c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = ['#FF85C0', '#6BCBFF', '#FFDE59', '#7ED957', '#B088F9'][Math.floor(Math.random()*5)];
        c.style.animationDuration = (Math.random() * 2 + 2) + 's';
        c.style.animationDelay = (Math.random() * 0.5) + 's';
        document.getElementById('scr-win').appendChild(c);
        setTimeout(()=>c.remove(), 4000);
    }
}

// Utils math
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
function getWNum(c, ct) { let r = new Set([c]); while(r.size < ct) { let n = c + rand(-5, 5); if(n>=0 && n!==c) r.add(n); } return shuffle([...r]); }
function getWLet(c, ct) { const a = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"; let r = new Set([c]); while(r.size < ct) r.add(a[rand(0,25)]); return shuffle([...r]); }

function generateGame() {
    if(currentScore >= currentTarget) { triggerWin(); return; }

    const q = document.getElementById('q-card'), grid = document.getElementById('ans-grid');
    grid.innerHTML = ''; q.style.fontSize = '4.5rem';
    let correct, opts = [];
    let max = 5 + (diffMult * 5); // Escala dificultad (10, 15, 20 max val)
    let a = rand(1, max), b = rand(1, max);

    if(mode === 'num') {
        switch(currentGameId) {
            case 1: q.innerText = EMOJIS[rand(0, EMOJIS.length-1)].repeat(a); q.style.fontSize = a>5?'2.5rem':'3.5rem'; correct = a; opts = getWNum(correct, 4); break;
            case 2: q.innerText = `${a} + ${b}`; correct = a + b; opts = getWNum(correct, 4); break;
            case 3: if(b>a) [a,b]=[b,a]; q.innerText = `${a} - ${b}`; correct = a - b; opts = getWNum(correct, 4); break;
            case 4: b=a+rand(1,5); if(Math.random()>0.5) [a,b]=[b,a]; q.innerText = `${a} vs ${b}`; correct = Math.max(a,b); opts = [a,b,a+1,b-1]; break;
            case 5: b=a+rand(1,5); if(Math.random()>0.5) [a,b]=[b,a]; q.innerText = `${a} vs ${b}`; correct = Math.min(a,b); opts = [a,b,a+1,b-1]; break;
            case 6: q.innerText = `${a}, ${a+1}, ?`; correct = a+2; opts = getWNum(correct, 4); break;
            case 7: q.innerText = `?, ${a+1}, ${a+2}`; correct = a; opts = getWNum(correct, 4); break;
            case 8: correct = rand(1, max)*2; q.innerText = 'PAR'; opts = shuffle([correct, correct+1, correct+3, correct-1]); break;
            case 9: q.innerText = `${a}, ?, ${a+2}`; correct = a+1; opts = getWNum(correct, 4); break;
            case 10: q.innerText = `2 x ${a}`; correct = a*2; opts = getWNum(correct, 4); break;
        }
    } else {
        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", voc = "AEIOU";
        switch(currentGameId) {
            case 1: correct = abc[rand(0,25)]; q.innerText = correct; opts = getWLet(correct, 4); break;
            case 2: correct = voc[rand(0,4)]; q.innerText = 'VOCAL'; let rv=new Set([correct]); while(rv.size<4) rv.add(abc[rand(5,25)]); opts = shuffle([...rv]); break;
            case 3: let i = rand(0, 22); q.innerText = `${abc[i]}, ${abc[i+1]}, ?`; correct = abc[i+2]; opts = getWLet(correct, 4); break;
            case 4: q.innerText = 'GATO'; q.style.fontSize='3rem'; correct = 'PATO'; opts = shuffle(['PATO','LUNA','SOL','MESA']); break;
            case 5: q.innerText = `S _ L`; correct = 'O'; opts = getWLet(correct, 4); break;
            case 6: correct = abc[rand(0,25)]; q.innerText = correct.toLowerCase(); opts = getWLet(correct, 4); break;
            case 7: let c7 = abc[rand(0,25)]; q.innerText = c7; correct = c7.toLowerCase(); let r7=new Set([correct]); while(r7.size<4) r7.add(abc[rand(0,25)].toLowerCase()); opts = shuffle([...r7]); break;
            case 8: let e8 = EMOJIS[rand(0,3)]; q.innerText = e8; q.style.fontSize='5rem'; if(e8==='🍎'){correct='MANZANA'; opts=['MANZANA','PERA','UVA','COCO'];} else {correct='PERRO'; opts=['PERRO','GATO','AVE','PEZ'];} opts=shuffle(opts); break;
            case 9: q.innerText = 'ESTRELLA'; q.style.fontSize='2.5rem'; correct='⭐'; opts=shuffle(['⭐','🚗','🎈','🦖']); break;
            case 10: q.innerText = '🚗'; correct='AUTO'; opts=shuffle(['AUTO','BICI','MOTO','TREN']); break;
        }
    }

    let fOpts = [...new Set(opts)];
    while(fOpts.length < 4) { let x = mode==='num'?rand(1,20):"ABCDEFGHIJKLMNOPQRSTUVWXYZ"[rand(0,25)]; if(!fOpts.includes(x)) fOpts.push(x); }
    
    fOpts.forEach(opt => {
        const btn = document.createElement('button'); btn.className = 'ans-btn'; btn.innerText = opt;
        btn.onclick = () => {
            if(opt == correct) {
                btn.classList.add('correct'); playNote(1046.5, 0.1, 'square'); 
                currentScore++; updateHUD();
                setTimeout(generateGame, 800);
            } else {
                btn.classList.add('wrong'); playNote(300, 0.2, 'sawtooth');
                setTimeout(()=>btn.classList.remove('wrong'), 400);
            }
        };
        grid.appendChild(btn);
    });
}
</script>
</body>
</html>
